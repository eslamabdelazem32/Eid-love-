<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كل سنة وأنتي طيبة يا رحيق ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(223, 100, 141, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 10;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* تأثير القلب النابض */
        .heart {
            font-size: 60px;
            color: #ff4d6d;
            animation: beat 0.8s infinite alternate;
            margin-bottom: 10px;
        }

        /* تصميم الخروف بالـ CSS */
        .sheep-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 20px auto;
        }

        .sheep-body {
            width: 100px;
            height: 80px;
            background: #ffffff;
            border-radius: 50px;
            position: absolute;
            bottom: 20px;
            left: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1),
                        -10px -5px 0 #f0f0f0 inset;
            animation: float 2s infinite ease-in-out alternate;
        }

        /* فرو الخروف الإضافي */
        .sheep-body::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            background: #ffffff;
            border-radius: 50%;
            top: -15px;
            left: 30px;
        }

        .sheep-head {
            width: 45px;
            height: 45px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 25px;
            right: 0px;
            animation: float 2s infinite ease-in-out alternate;
        }

        /* عيون الخروف */
        .sheep-head::after {
            content: '• •';
            color: #fff;
            font-size: 12px;
            position: absolute;
            top: 10px;
            left: 12px;
        }

        /* قرون الخروف */
        .horn {
            width: 15px;
            height: 15px;
            border: 3px solid #f39c12;
            border-radius: 50% 50% 0 0;
            border-bottom: none;
            position: absolute;
            top: 13px;
            right: 15px;
            transform: rotate(20deg);
        }

        /* أرجل الخروف */
        .leg {
            width: 6px;
            height: 25px;
            background: #333;
            position: absolute;
            bottom: 0;
            border-radius: 0 0 5px 5px;
        }
        .leg1 { left: 30px; }
        .leg2 { left: 45px; }
        .leg3 { left: 65px; }
        .leg4 { left: 80px; }

        /* النصوص */
        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            color: #4a4a4a;
            font-size: 18px;
            line-height: 1.6;
            font-weight: 500;
        }

        /* تأثيرات الأنميشن */
        @keyframes beat {
            to { transform: scale(1.2); }
        }

        @keyframes float {
            to { transform: translateY(-8px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* عناصر الخلفية المتساقطة */
        .particle {
            position: absolute;
            top: -20px;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">❤️</div>
        
        <!-- خروف العيد -->
        <div class="sheep-container">
            <div class="horn"></div>
            <div class="sheep-body"></div>
            <div class="sheep-head"></div>
            <div class="leg leg1"></div>
            <div class="leg leg2"></div>
            <div class="leg leg3"></div>
            <div class="leg leg4"></div>
        </div>

        <h1>كل سنة وأنتي طيبة يا حبيبتي! 🥰</h1>
        <p>بمناسبة عيد الأضحى المبارك، حبيت أكون أول واحد يعيد عليكي بطريقتي الخاصة.. كل عيد وأنتي منورة حياتي ومعايا دايماً يا رب. 🐑✨</p>
    </div>

    <script>
        // سكريبت لتوليد قلوب وخراف بتتساقط في الخلفية
        function createParticle() {
            const particles = ['❤️', '🐑', '🌸', '✨'];
            const particleEl = document.createElement('div');
            particleEl.classList.add('particle');
            
            // اختيار شكل عشوائي
            particleEl.innerText = particles[Math.floor(Math.random() * particles.length)];
            
            // إعدادات عشوائية للمكان والسرعة والحجم
            particleEl.style.left = Math.random() * 100 + 'vw';
            particleEl.style.fontSize = Math.random() * 20 + 15 + 'px';
            
            const duration = Math.random() * 3 + 3; // بين 3 لـ 6 ثواني
            particleEl.style.animationDuration = duration + 's';
            
            document.body.appendChild(particleEl);
            
            // حذف العنصر بعد ما يختفي من الشاشة
            setTimeout(() => {
                particleEl.remove();
            }, duration * 1000);
        }

        // توليد العناصر باستمرار
        setInterval(createParticle, 300);
    </script>
</body>
</html>
